services:
  mysql:
    image: mysql:8.4
    container_name: skill-sync-backend-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: skill-sync-backend-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - skillsync-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    image: eclipse-temurin:17-jre-alpine
    container_name: discovery-server
    ports:
      - "8761:8761"
    volumes:
      - ./discovery-server/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/discovery-server-1.0.0*.jar" ]
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - skillsync-network

  api-gateway:
    image: eclipse-temurin:17-jre-alpine
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/api-gateway-1.0.0*.jar" ]
    env_file: .env
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID=true
    depends_on:
      - discovery-server
    networks:
      - skillsync-network

  user-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: user-service
    ports:
      - "8082:8082"
    volumes:
      - ./user-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/user-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_user?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  auth-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: auth-service
    ports:
      - "8081:8081"
    volumes:
      - ./auth-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/auth-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_auth?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - USER_SERVICE_URL=http://user-service:8082
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  mentor-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: mentor-service
    ports:
      - "8084:8084"
    volumes:
      - ./mentor-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/mentor-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_mentor?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  skill-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: skill-service
    ports:
      - "8083:8083"
    volumes:
      - ./skill-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/skill-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_skill?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  session-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: session-service
    ports:
      - "8085:8085"
    volumes:
      - ./session-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/session-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_session?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - USER_SERVICE_URL=http://user-service:8082
      - MENTOR_SERVICE_URL=http://mentor-service:8084
      - SKILL_SERVICE_URL=http://skill-service:8083
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network


  group-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: group-service
    ports:
      - "8086:8086"
    volumes:
      - ./group-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/group-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_group?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - USER_SERVICE_URL=http://user-service:8082
      - SKILL_SERVICE_URL=http://skill-service:8083
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  review-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: review-service
    ports:
      - "8087:8087"
    volumes:
      - ./review-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/review-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_review?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SESSION_SERVICE_URL=http://session-service:8085
      - MENTOR_SERVICE_URL=http://mentor-service:8084
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  notification-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: notification-service
    ports:
      - "8088:8088"
    volumes:
      - ./notification-service/target:/app
    command: [ "sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -jar /app/notification-service-1.0.0*.jar" ]
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_notification?createDatabaseIfNotExist=true
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - skillsync-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: skillsync-zipkin
    ports:
      - "9411:9411"
    networks:
      - skillsync-network

  sonarqube:
    image: sonarqube:10-community
    container_name: skillsync-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - skillsync-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: skillsync-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - skillsync-network
    depends_on:
      - api-gateway
      - auth-service
      - user-service
      - mentor-service
      - skill-service
      - session-service
      - group-service
      - review-service
      - notification-service
      - discovery-server

  grafana:
    image: grafana/grafana:11.2.0
    container_name: skillsync-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - skillsync-network
    depends_on:
      - prometheus

networks:
  skillsync-network:
    driver: bridge

volumes:
  mysql-data:
  grafana-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:

