server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

# Skill Service
spring.cloud.gateway.routes[2].id=skill-service
spring.cloud.gateway.routes[2].uri=lb://skill-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/skills/**

# Mentor Service
spring.cloud.gateway.routes[3].id=mentor-service
spring.cloud.gateway.routes[3].uri=lb://mentor-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/mentors/**

# Session Service
spring.cloud.gateway.routes[4].id=session-service
spring.cloud.gateway.routes[4].uri=lb://session-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/sessions/**

# Group Service
spring.cloud.gateway.routes[5].id=group-service
spring.cloud.gateway.routes[5].uri=lb://group-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/groups/**

# Review Service
spring.cloud.gateway.routes[6].id=review-service
spring.cloud.gateway.routes[6].uri=lb://review-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/reviews/**

# Notification Service
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/notifications/**

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
