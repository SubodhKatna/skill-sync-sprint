server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

# Skill Service
spring.cloud.gateway.routes[2].id=skill-service
spring.cloud.gateway.routes[2].uri=lb://skill-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/skills/**

# Mentor Service
spring.cloud.gateway.routes[3].id=mentor-service
spring.cloud.gateway.routes[3].uri=lb://mentor-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/mentors/**

# Session Service
spring.cloud.gateway.routes[4].id=session-service
spring.cloud.gateway.routes[4].uri=lb://session-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/sessions/**

# Group Service
spring.cloud.gateway.routes[5].id=group-service
spring.cloud.gateway.routes[5].uri=lb://group-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/groups/**

# Review Service
spring.cloud.gateway.routes[6].id=review-service
spring.cloud.gateway.routes[6].uri=lb://review-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/reviews/**

# Notification Service
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/notifications/**

# Auth Service OpenAPI
spring.cloud.gateway.routes[8].id=auth-service-docs
spring.cloud.gateway.routes[8].uri=lb://auth-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/v3/api-docs/auth-service
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/v3/api-docs/auth-service,/v3/api-docs

# User Service OpenAPI
spring.cloud.gateway.routes[9].id=user-service-docs
spring.cloud.gateway.routes[9].uri=lb://user-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/v3/api-docs/user-service
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/v3/api-docs/user-service,/v3/api-docs

# Skill Service OpenAPI
spring.cloud.gateway.routes[10].id=skill-service-docs
spring.cloud.gateway.routes[10].uri=lb://skill-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/v3/api-docs/skill-service
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/v3/api-docs/skill-service,/v3/api-docs

# Mentor Service OpenAPI
spring.cloud.gateway.routes[11].id=mentor-service-docs
spring.cloud.gateway.routes[11].uri=lb://mentor-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/v3/api-docs/mentor-service
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/v3/api-docs/mentor-service,/v3/api-docs

# Session Service OpenAPI
spring.cloud.gateway.routes[12].id=session-service-docs
spring.cloud.gateway.routes[12].uri=lb://session-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/v3/api-docs/session-service
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/v3/api-docs/session-service,/v3/api-docs

# Group Service OpenAPI
spring.cloud.gateway.routes[13].id=group-service-docs
spring.cloud.gateway.routes[13].uri=lb://group-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/v3/api-docs/group-service
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/v3/api-docs/group-service,/v3/api-docs

# Review Service OpenAPI
spring.cloud.gateway.routes[14].id=review-service-docs
spring.cloud.gateway.routes[14].uri=lb://review-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/v3/api-docs/review-service
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/v3/api-docs/review-service,/v3/api-docs

# Notification Service OpenAPI
spring.cloud.gateway.routes[15].id=notification-service-docs
spring.cloud.gateway.routes[15].uri=lb://notification-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/v3/api-docs/notification-service
spring.cloud.gateway.routes[15].filters[0]=RewritePath=/v3/api-docs/notification-service,/v3/api-docs

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service
springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/user-service
springdoc.swagger-ui.urls[2].name=skill-service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/skill-service
springdoc.swagger-ui.urls[3].name=mentor-service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/mentor-service
springdoc.swagger-ui.urls[4].name=session-service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/session-service
springdoc.swagger-ui.urls[5].name=group-service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/group-service
springdoc.swagger-ui.urls[6].name=review-service
springdoc.swagger-ui.urls[6].url=/v3/api-docs/review-service
springdoc.swagger-ui.urls[7].name=notification-service
springdoc.swagger-ui.urls[7].url=/v3/api-docs/notification-service

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
