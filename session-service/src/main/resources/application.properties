server.port=8085
spring.application.name=session-service

# JWT
jwt.secret=${JWT_SECRET:SkillSyncSuperSecretKeyForJWTTokenGeneration2024ThatIsLongEnoughForHS256}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillsync_session?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

user.service.url=${USER_SERVICE_URL:http://localhost:8082}
mentor.service.url=${MENTOR_SERVICE_URL:http://localhost:8084}
skill.service.url=${SKILL_SERVICE_URL:http://localhost:8083}
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ exchange/queue names
rabbitmq.exchange=skillsync.exchange
rabbitmq.queue.session=skillsync.session.queue
rabbitmq.routingkey.session=session.event

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
