sonar.projectKey=skillsync-backend
sonar.projectName=SkillSync Backend
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9000
# Set your token here or pass via CLI: -Dsonar.token=<token>
sonar.token=

sonar.java.source=17
sonar.sourceEncoding=UTF-8

# Exclusions — generated code, configs, test infra
sonar.exclusions=**/target/**,**/*Application.java,**/exception/ErrorResponse.java

sonar.coverage.jacoco.xmlReportPaths=\
  auth-service/target/site/jacoco/jacoco.xml,\
  user-service/target/site/jacoco/jacoco.xml,\
  skill-service/target/site/jacoco/jacoco.xml,\
  mentor-service/target/site/jacoco/jacoco.xml,\
  session-service/target/site/jacoco/jacoco.xml,\
  group-service/target/site/jacoco/jacoco.xml,\
  review-service/target/site/jacoco/jacoco.xml,\
  notification-service/target/site/jacoco/jacoco.xml
